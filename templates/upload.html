{% extends "base.html" %}

{% block title %}Upload Files - SecureNotes{% endblock %}

{% block content %}
<div class="container">
    <div class="content-box">
        <h1>Upload Files</h1>
        <p>Attach files to your notes for easy access.</p>

        <div class="upload-area">
            <form method="POST" enctype="multipart/form-data" class="upload-form">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" name="file" required>
                    <label for="fileInput" class="file-label">
                        <div class="upload-icon">📁</div>
                        <p>Click to select file or drag and drop</p>
                        <small>Supported: txt, pdf, images, documents</small>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Upload File</button>
            </form>
        </div>

        <div class="info-box">
            <h3>Allowed File Types</h3>
            <p>txt, pdf, png, jpg, jpeg, gif, doc, docx</p>
            <p>Maximum file size: 16MB</p>
        </div>
    </div>
</div>
{% endblock %}
